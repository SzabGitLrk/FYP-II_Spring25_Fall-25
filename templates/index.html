<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rice Classification System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f8f9fa;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding-top: 40px;
    }
    .card {
      border-radius: 15px;
    }
    #results img {
      max-height: 400px;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="text-center">
      <h1 class="display-5 text-primary mb-3">🌾 Rice Classification</h1>
      <p class="lead text-secondary">Upload an image of rice to identify its type.</p>
    </div>

    <!-- Upload Form -->
    <div class="card shadow p-4 mt-4">
      <form action="/" method="POST" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="file" class="form-label">Select Rice Image:</label>
          <input type="file" class="form-control" id="file" name="file" accept="image/*" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Upload & Classify</button>
      </form>
    </div>

    {% if result %}
    <!-- Display Results -->
    <div id="results" class="mt-4">
      <div class="card shadow">
        <div class="card-body text-center">
          <h4 class="card-title text-success">{{ result }}</h4>
          <p class="card-text">
            Confidence:
            <span class="fw-bold {% if confidence >= 80 %}text-success{% elif confidence >= 50 %}text-warning{% else %}text-danger{% endif %}">
              {{ confidence }}%
            </span>
          </p>
          <img src="{{ file_path }}" class="img-fluid" alt="Uploaded Image">
        </div>
      </div>
    </div>
    {% endif %}
  </div>

</body>
</html>
