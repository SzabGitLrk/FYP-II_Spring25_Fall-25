<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Healthcare Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <header>
    <h1>AI Healthcare Assistant</h1>
  </header>

  <main>
    <section aria-labelledby="login-title" class="auth-section">
      <article class="auth-card">
        <h2 id="login-title">User Login</h2>
        
        <!-- Updated form with correct IDs -->
        <form id="loginForm" class="auth-form">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter email" required>

          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required>

          <button type="submit">Login</button>

          <!-- Status message div -->
          <div id="loginStatus"></div>
        </form>

        <p class="switch-page">
          Don’t have an account? 
          <a href="{{ url_for('signup') }}">Sign Up</a>
        </p>
      </article>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 AI Healthcare Assistant. All rights reserved.</p>
  </footer>

  <!-- JS script -->
  <script type="module" src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
